        <main>
            <h1>Formulario de contacto</h1>
            <form class="formulario" id="formulario1">
                <label for="nombre">Nombre:</label>
                <input id="nombre" type="text" placeholder="Ingresa tu nombre" size="50" maxlength="20" >

                <label for="correo">Email:</label>
                <input id="correo" type="email" placeholder="Ingresa tu correo" required>

                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" placeholder="Escribe tu mensaje" required class="form-control" aria-label="With textarea"></textarea>

                <button type="submit" value="submit" class="btn btn-warning">Enviar</button>

                
            </form>
